<!DOCTYPE html>
<html lang="en" data-playable-mode="export">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>Ai Tutor Quiz (template preview)</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#0f172a;font-family:system-ui,sans-serif}
:root{--pb-export-design-w:390px;--pb-export-design-h:844px;--pb-export-scale:1}
#playable-shell{position:fixed;inset:0;display:flex;overflow:hidden;background:#0f172a}
#playable-viewport{width:100%;height:100dvh;min-height:100%;display:flex;flex-direction:column;overflow:hidden;container-type:size;container-name:page;background:var(--pb-bg,#0f172a)}
html[data-export-layout="desktop"] #playable-shell{align-items:center;justify-content:center}
html[data-export-layout="desktop"] #playable-viewport{width:var(--pb-export-design-w);height:var(--pb-export-design-h);min-height:0;flex-shrink:0;transform:scale(var(--pb-export-scale,1));transform-origin:center center}
#playable-root{flex:1;min-height:0;width:100%;display:flex;flex-direction:column}
#playable-root>.pb-studio__app{flex:1;height:100%;min-height:0;width:100%;container-type:normal;container-name:none}
/**
 * Playable runtime — mobile 390×844 scaling (cqw/cqh on __app).
 * Theme via CSS variables: --pb-bg, --pb-fg, --pb-accent, --pb-muted, --pb-card
 */

.pb-step,
.pb-regions {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
}

.pb-block {
  display: flex;
  flex-direction: column;
  flex: 1;
  gap: calc(16 / var(--pb-design-h, 844) * 100cqh);
  animation: pb-fade-in 0.35s ease;
}

@keyframes pb-fade-in {
  from {
    opacity: 0;
    transform: translateY(calc(8 / var(--pb-design-h, 844) * 100cqh));
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.pb-headline {
  margin: 0;
  font-size: calc(28 / var(--pb-design-w, 390) * 100cqw);
  font-weight: 700;
  line-height: 1.2;
  color: var(--pb-fg, #fff);
}

.pb-headline--sm {
  font-size: calc(22 / var(--pb-design-w, 390) * 100cqw);
}

.pb-subhead {
  margin: 0;
  font-size: calc(15 / var(--pb-design-w, 390) * 100cqw);
  line-height: 1.45;
  color: var(--pb-muted, #a3a3a3);
}

.pb-body {
  margin: 0;
  font-size: calc(14 / var(--pb-design-w, 390) * 100cqw);
  line-height: 1.5;
  color: var(--pb-fg, #fff);
}

.pb-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-top: calc(12 / var(--pb-design-h, 844) * 100cqh);
  padding: calc(14 / var(--pb-design-h, 844) * 100cqh) calc(24 / var(--pb-design-w, 390) * 100cqw);
  border: none;
  border-radius: calc(999 / var(--pb-design-w, 390) * 100cqw);
  font-size: calc(16 / var(--pb-design-w, 390) * 100cqw);
  font-weight: 600;
  cursor: pointer;
}

.pb-btn--primary {
  background: var(--pb-accent, #3b82f6);
  color: #fff;
}

.pb-btn--secondary {
  background: transparent;
  border: calc(2 / var(--pb-design-w, 390) * 100cqw) solid var(--pb-accent, #3b82f6);
  color: var(--pb-fg, #fff);
}

.pb-btn--cta {
  width: 100%;
  background: var(--pb-accent, #22c55e);
  color: #fff;
  transition: transform 0.2s ease;
}

.pb-btn--cta:active {
  transform: scale(0.98);
}

.pb-tap-to-start__inner {
  display: flex;
  flex: 1;
  flex-direction: column;
  justify-content: center;
  text-align: center;
  padding: calc(24 / var(--pb-design-h, 844) * 100cqh) calc(16 / var(--pb-design-w, 390) * 100cqw);
}

.pb-chip,
.pb-chat-stream__chips .pb-chip,
.pb-chip-picker__chips .pb-chip {
  padding: calc(10 / var(--pb-design-h, 844) * 100cqh) calc(14 / var(--pb-design-w, 390) * 100cqw);
  border-radius: calc(999 / var(--pb-design-w, 390) * 100cqw);
  border: calc(1 / var(--pb-design-w, 390) * 100cqw) solid var(--pb-muted, #555);
  background: var(--pb-card, #1a1a1a);
  color: var(--pb-fg, #fff);
  font-size: calc(13 / var(--pb-design-w, 390) * 100cqw);
  cursor: pointer;
}

.pb-chip--active {
  border-color: var(--pb-accent, #3b82f6);
  background: color-mix(in srgb, var(--pb-accent, #3b82f6) 20%, transparent);
}

.pb-chat-stream__chips,
.pb-chip-picker__chips {
  display: flex;
  flex-wrap: wrap;
  gap: calc(8 / var(--pb-design-w, 390) * 100cqw);
}

.pb-chat-stream__thread {
  display: flex;
  flex-direction: column;
  gap: calc(10 / var(--pb-design-h, 844) * 100cqh);
  flex: 1;
}

.pb-bubble {
  max-width: 88%;
  padding: calc(12 / var(--pb-design-h, 844) * 100cqh) calc(14 / var(--pb-design-w, 390) * 100cqw);
  border-radius: calc(14 / var(--pb-design-w, 390) * 100cqw);
  font-size: calc(14 / var(--pb-design-w, 390) * 100cqw);
  line-height: 1.45;
}

.pb-bubble--user {
  align-self: flex-end;
  background: var(--pb-accent, #3b82f6);
  color: #fff;
}

.pb-bubble--ai {
  align-self: flex-start;
  background: var(--pb-card, #1f2937);
  color: var(--pb-fg, #fff);
}

.pb-typing {
  align-self: flex-start;
  padding: calc(8 / var(--pb-design-h, 844) * 100cqh) calc(12 / var(--pb-design-w, 390) * 100cqw);
  font-size: calc(20 / var(--pb-design-w, 390) * 100cqw);
  color: var(--pb-muted, #888);
}

.pb-result-card__card {
  padding: calc(16 / var(--pb-design-h, 844) * 100cqh) calc(16 / var(--pb-design-w, 390) * 100cqw);
  border-radius: calc(12 / var(--pb-design-w, 390) * 100cqw);
  background: var(--pb-card, #111827);
  border: calc(1 / var(--pb-design-w, 390) * 100cqw) solid #333;
}

.pb-benefits {
  margin: calc(12 / var(--pb-design-h, 844) * 100cqh) 0 0;
  padding-left: calc(18 / var(--pb-design-w, 390) * 100cqw);
  font-size: calc(13 / var(--pb-design-w, 390) * 100cqw);
  color: var(--pb-fg, #fff);
}

.pb-benefits__item {
  margin-bottom: calc(6 / var(--pb-design-h, 844) * 100cqh);
}

.pb-store-cta {
  justify-content: flex-end;
  padding-bottom: calc(16 / var(--pb-design-h, 844) * 100cqh);
}

.pb-regions {
  gap: calc(12 / var(--pb-design-h, 844) * 100cqh);
}

.pb-region--footer {
  margin-top: auto;
}

.pb-error {
  color: #f87171;
  font-size: calc(14 / var(--pb-design-w, 390) * 100cqw);
}

/* Studio scenario elements — scales via --pb-design-w / --pb-design-h (default 390×844) */
.pb-studio__app {
  container-type: size;
  container-name: page;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  width: 100%;
  min-height: 100%;
  flex: 1;
  --pb-design-w: 390;
  --pb-design-h: 844;
  background: var(--pb-bg, #0f172a);
  color: var(--pb-fg, #fff);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: calc(16 / var(--pb-design-w) * 100cqw);
  /* Content inset tokens — applied on .pb-studio__content only (bg is full-bleed) */
  --pb-inset-x: calc(20 / var(--pb-design-w) * 100cqw);
  --pb-inset-y: calc(20 / var(--pb-design-h) * 100cqh);
  --pb-inset-bottom: calc(24 / var(--pb-design-h) * 100cqh);
  --pb-gap: calc(14 / var(--pb-design-h) * 100cqh);
  overflow: hidden;
  position: relative;
}

/* Typography scales via app font-size (16px @ design width) — use em inside studio */
.pb-studio__app .pb-headline {
  font-size: 1.75em;
  margin-bottom: 0.5em;
}
.pb-studio__app .pb-subhead {
  font-size: 0.9375em;
}
.pb-studio__app .pb-body {
  font-size: 0.875em;
}
.pb-studio__app .pb-btn {
  font-size: 1em;
  padding: 0.875em 1.5em;
  margin-top: 0.75em;
  border-radius: 999em;
}
.pb-studio__app .pb-bubble {
  font-size: 0.875em;
  padding: 0.75em 0.9em;
}

.pb-studio__stage {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  overflow: hidden;
  position: relative;
  height: 100%;
}

/* Full-bleed background layer (edge-to-edge inside device frame) */
.pb-studio__bg {
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

/* Padded content stack — prompt-editable via playable.layout */
.pb-studio__content {
  position: relative;
  z-index: 1;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: var(--pb-gap);
  min-height: 0;
  overflow-x: hidden;
  overflow-y: auto;
  padding:
    max(var(--pb-inset-y), env(safe-area-inset-top, 0px))
    var(--pb-inset-x)
    max(var(--pb-inset-bottom), env(safe-area-inset-bottom, 0px));
}

/* Overlay hints (hand tap) — aligned to content insets */
.pb-studio__overlay {
  position: absolute;
  inset: 0;
  z-index: 4;
  pointer-events: none;
}

.pb-el--background {
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  margin: 0 !important;
}
.pb-studio__app.pb-studio--paused,
.pb-studio__app.pb-studio--paused * {
  animation-play-state: paused !important;
}
.pb-el:not(.pb-el--background) {
  position: relative;
  z-index: 1;
}
.pb-el--overlay {
  position: absolute;
  left: var(--pb-inset-x);
  right: var(--pb-inset-x);
  bottom: max(var(--pb-inset-bottom), env(safe-area-inset-bottom, 0px));
  z-index: 4;
  pointer-events: none;
  margin: 0 !important;
}

/* ── Image / Lottie ── */
.pb-image {
  border-radius: calc(14 / var(--pb-design-w) * 100cqw);
  overflow: hidden;
  box-shadow: 0 calc(8 / var(--pb-design-h) * 100cqh) calc(24 / var(--pb-design-h) * 100cqh) rgba(0, 0, 0, 0.35);
}
.pb-image img {
  display: block;
  width: 100%;
  height: auto;
  max-height: calc(200 / var(--pb-design-h) * 100cqh);
  object-fit: cover;
}
.pb-image--hero img {
  max-height: calc(160 / var(--pb-design-h) * 100cqh);
  width: 100%;
  object-fit: cover;
  border-radius: calc(14 / var(--pb-design-w) * 100cqw);
}
.pb-feature-grid__icon {
  width: calc(24 / var(--pb-design-w) * 100cqw);
  height: calc(24 / var(--pb-design-w) * 100cqw);
  min-width: calc(24 / var(--pb-design-w) * 100cqw);
  min-height: calc(24 / var(--pb-design-w) * 100cqw);
  object-fit: contain;
  object-position: center;
  display: block;
}
.pb-stat-strip {
  display: flex;
  gap: calc(8 / var(--pb-design-w) * 100cqw);
  width: 100%;
  margin: calc(8 / var(--pb-design-h) * 100cqh) 0;
}
.pb-stat-strip__item {
  flex: 1;
  text-align: center;
  padding: calc(10 / var(--pb-design-h) * 100cqh) calc(6 / var(--pb-design-w) * 100cqw);
  border-radius: calc(12 / var(--pb-design-w) * 100cqw);
  background: color-mix(in srgb, var(--pb-fg, #fff) 6%, var(--pb-card, #1e293b));
}
.pb-stat-strip__value {
  display: block;
  font-size: calc(18 / var(--pb-design-w) * 100cqw);
  font-weight: 800;
  color: var(--pb-accent, #3b82f6);
}
.pb-stat-strip__label {
  display: block;
  margin-top: calc(4 / var(--pb-design-h) * 100cqh);
  font-size: calc(10 / var(--pb-design-w) * 100cqw);
  color: var(--pb-muted, #94a3b8);
}
.pb-feature-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: calc(10 / var(--pb-design-w) * 100cqw);
  width: 100%;
}
.pb-feature-grid__cell {
  padding: calc(12 / var(--pb-design-h) * 100cqh) calc(10 / var(--pb-design-w) * 100cqw);
  border-radius: calc(12 / var(--pb-design-w) * 100cqw);
  background: color-mix(in srgb, var(--pb-fg, #fff) 5%, var(--pb-card, #1e293b));
}
.pb-feature-grid__title {
  margin: calc(6 / var(--pb-design-h) * 100cqh) 0 calc(2 / var(--pb-design-h) * 100cqh);
  font-size: calc(12 / var(--pb-design-w) * 100cqw);
  font-weight: 700;
}
.pb-feature-grid__text {
  margin: 0;
  font-size: calc(10 / var(--pb-design-w) * 100cqw);
  line-height: 1.4;
  color: var(--pb-muted, #94a3b8);
}
.pb-feature-grid__icon--dot {
  width: calc(10 / var(--pb-design-w) * 100cqw);
  height: calc(10 / var(--pb-design-w) * 100cqw);
  border-radius: 50%;
  background: var(--pb-accent, #3b82f6);
}
.pb-quote-card {
  margin: 0;
  padding: calc(14 / var(--pb-design-h) * 100cqh) calc(16 / var(--pb-design-w) * 100cqw);
  border-radius: calc(14 / var(--pb-design-w) * 100cqw);
  background: color-mix(in srgb, var(--pb-accent, #3b82f6) 12%, var(--pb-card, #1e293b));
  border-left: calc(3 / var(--pb-design-w) * 100cqw) solid var(--pb-accent, #3b82f6);
}
.pb-quote-card__text {
  margin: 0 0 calc(8 / var(--pb-design-h) * 100cqh);
  font-size: calc(13 / var(--pb-design-w) * 100cqw);
  line-height: 1.5;
  font-style: italic;
}
.pb-quote-card__cite {
  font-size: calc(11 / var(--pb-design-w) * 100cqw);
  color: var(--pb-muted, #94a3b8);
  font-style: normal;
}
.pb-lottie {
  width: calc(72 / var(--pb-design-w) * 100cqw);
  height: calc(72 / var(--pb-design-w) * 100cqw);
  margin: 0 auto calc(8 / var(--pb-design-h) * 100cqh);
}
.pb-el--lottie.pb-el--overlay .pb-lottie,
.pb-lottie--overlay {
  position: absolute;
  bottom: calc(12 / var(--pb-design-h) * 100cqh);
  left: 50%;
  transform: translateX(-50%);
  width: calc(88 / var(--pb-design-w) * 100cqw);
  height: calc(88 / var(--pb-design-w) * 100cqw);
  margin: 0;
  z-index: 5;
  pointer-events: none;
}
.pb-lottie--cta {
  width: calc(56 / var(--pb-design-w) * 100cqw);
  height: calc(56 / var(--pb-design-w) * 100cqw);
  margin: calc(-8 / var(--pb-design-h) * 100cqh) auto calc(4 / var(--pb-design-h) * 100cqh);
}
.pb-lottie--cta-hand {
  position: absolute;
  bottom: calc(72 / var(--pb-design-h) * 100cqh);
  left: 58%;
  transform: translateX(-50%);
  width: calc(72 / var(--pb-design-w) * 100cqw);
  height: calc(72 / var(--pb-design-w) * 100cqw);
  margin: 0;
  z-index: 6;
  pointer-events: none;
}
.pb-cta-arrow {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: calc(2 / var(--pb-design-h) * 100cqh);
  margin: calc(4 / var(--pb-design-h) * 100cqh) auto calc(2 / var(--pb-design-h) * 100cqh);
  animation: pb-cta-arrow-bounce 1.4s ease-in-out infinite;
}
.pb-cta-arrow__line {
  display: block;
  width: calc(2 / var(--pb-design-w) * 100cqw);
  height: calc(20 / var(--pb-design-h) * 100cqh);
  background: var(--pb-accent, #3b82f6);
  border-radius: 2px;
  opacity: 0.85;
}
.pb-cta-arrow__head {
  font-size: calc(18 / var(--pb-design-w) * 100cqw);
  color: var(--pb-accent, #3b82f6);
  line-height: 1;
  filter: drop-shadow(0 0 6px color-mix(in srgb, var(--pb-accent, #3b82f6) 50%, transparent));
}
.pb-cta-download-hint {
  margin: 0 auto calc(6 / var(--pb-design-h) * 100cqh);
  text-align: center;
  font-size: calc(13 / var(--pb-design-w) * 100cqw);
  font-weight: 600;
  color: var(--pb-accent, #3b82f6);
  animation: pb-anim-pulse 2s ease-in-out infinite;
}
@keyframes pb-cta-arrow-bounce {
  0%,
  100% {
    transform: translateY(0);
    opacity: 0.75;
  }
  50% {
    transform: translateY(calc(6 / var(--pb-design-h) * 100cqh));
    opacity: 1;
  }
}
.pb-ai-answer-progress {
  padding: calc(10 / var(--pb-design-h) * 100cqh) calc(14 / var(--pb-design-w) * 100cqw);
  border-radius: calc(12 / var(--pb-design-w) * 100cqw);
  background: color-mix(in srgb, var(--pb-fg, #fff) 5%, var(--pb-card, #1e293b));
}
.pb-ai-answer-progress__label {
  margin: 0 0 calc(8 / var(--pb-design-h) * 100cqh);
  font-size: calc(12 / var(--pb-design-w) * 100cqw);
  font-weight: 600;
  color: var(--pb-muted, #94a3b8);
}
.pb-ai-answer-progress__track {
  height: calc(8 / var(--pb-design-h) * 100cqh);
  border-radius: 999px;
  background: color-mix(in srgb, var(--pb-fg, #fff) 8%, transparent);
  overflow: hidden;
}
.pb-ai-answer-progress__fill {
  display: block;
  height: 100%;
  width: var(--pb-progress, 0%);
  border-radius: inherit;
  background: linear-gradient(
    90deg,
    var(--pb-accent, #3b82f6),
    color-mix(in srgb, var(--pb-accent, #3b82f6) 70%, #fff)
  );
  animation: pb-progress-fill 1.2s ease forwards;
}
.pb-ai-answer-progress__pct {
  display: block;
  margin-top: calc(6 / var(--pb-design-h) * 100cqh);
  font-size: calc(11 / var(--pb-design-w) * 100cqw);
  font-weight: 700;
  color: var(--pb-accent, #3b82f6);
  text-align: right;
}
@keyframes pb-progress-fill {
  from {
    width: 0;
  }
  to {
    width: var(--pb-progress, 72%);
  }
}
.pb-image-canvas__img {
  display: block;
  width: 100%;
  height: calc(220 / var(--pb-design-h) * 100cqh);
  object-fit: cover;
  border-radius: calc(12 / var(--pb-design-w) * 100cqw) calc(12 / var(--pb-design-w) * 100cqw) 0 0;
}
.pb-image-compare__pane {
  background-size: cover;
  background-position: center;
}

/* Screen transition — duration/easing via --pb-enter-duration / --pb-enter-easing on stage */
.pb-studio__stage--enter-slide {
  animation: pb-screen-enter var(--pb-enter-duration, 0.42s) var(--pb-enter-easing, cubic-bezier(0.22, 1, 0.36, 1)) both;
}
.pb-studio__stage--enter-fade {
  animation: pb-screen-fade var(--pb-enter-duration, 0.4s) var(--pb-enter-easing, ease) both;
}
.pb-studio__stage--enter-fade-up {
  animation: pb-screen-fade-up var(--pb-enter-duration, 0.45s) var(--pb-enter-easing, ease) both;
}
.pb-studio__stage--enter-pop-in {
  animation: pb-screen-pop-in var(--pb-enter-duration, 0.45s) var(--pb-enter-easing, cubic-bezier(0.34, 1.4, 0.64, 1)) both;
}
.pb-studio__stage--enter-fade-down {
  animation: pb-screen-fade-down var(--pb-enter-duration, 0.45s) var(--pb-enter-easing, ease) both;
}
.pb-studio__stage--enter-modal {
  animation: pb-screen-modal var(--pb-enter-duration, 0.5s) cubic-bezier(0.22, 1, 0.36, 1) both;
}
@keyframes pb-screen-fade-down {
  from {
    opacity: 0;
    transform: translateY(calc(-20 / var(--pb-design-h) * 100cqh));
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
@keyframes pb-screen-modal {
  from {
    opacity: 0;
    transform: scale(0.88);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}
.pb-studio__content--cta-center {
  justify-content: center !important;
  text-align: center;
  gap: calc(12 / var(--pb-design-h) * 100cqh);
}
.pb-studio__stage--cta-overlay::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.72);
  z-index: 4;
  pointer-events: none;
}
.pb-studio__content--cta-overlay {
  position: relative;
  z-index: 5;
  justify-content: flex-end !important;
  padding-bottom: calc(28 / var(--pb-design-h) * 100cqh);
}
.pb-icon-themed {
  display: inline-block;
  width: calc(22 / var(--pb-design-w) * 100cqw);

.pb-btn--cta {
  position: relative;

  overflow: visible;

.pb-btn--cta::before {
  content: "";
  position: absolute;
  inset: calc(-5 / var(--pb-design-w) * 100cqw);
  border-radius: inherit;
  background: color-mix(in srgb, var(--pb-accent, #7c3aed) 50%, transparent);

  opacity: 0.45;
  z-index: -1;
  pointer-events: none;
}

.pb-btn--cta.pb-anim-cta-attention::before,
.pb-btn--cta.pb-anim-cta-glow::before,
.pb-el--cta-button.pb-anim-cta-attention .pb-btn--cta::before,
.pb-el--cta-button.pb-anim-cta-glow .pb-btn--cta::before {
  animation: pb-cta-blur-attention 2.1s ease-in-out infinite;
}

.pb-btn--cta.pb-anim-cta-attention,
.pb-btn--cta.pb-anim-cta-glow,
.pb-el--cta-button.pb-anim-cta-attention .pb-btn--cta,
.pb-el--cta-button.pb-anim-cta-glow .pb-btn--cta {
  animation: pb-cta-spring-attention 2.1s cubic-bezier(0.34, 1.45, 0.64, 1) infinite;
}

}

}

  from {
    opacity: 0;
    transform: translateY(calc(-10 / var(--pb-design-h) * 100cqh));
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes pb-pop-in {
  from {
    opacity: 0;
    transform: scale(0.88);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

@keyframes pb-slide-left {
  from {
    opacity: 0;
    transform: translateX(calc(24 / var(--pb-design-w) * 100cqw));
  }
  to {
    opacity: 1;

  }

  }
  to {
    opacity: 1;
    transform: translateX(0);
  }

  0%, 100% {
    transform: scale(1);
  }
  40% {
    transform: scale(1.07);
  }
  55% {
    transform: scale(0.98);
  }
  70% {

  }
}

    filter: blur(calc(10 / var(--pb-design-w) * 100cqw));

  50% {

  }
  to {
    opacity: 1;

  80% { transform: translateX(calc(3 / var(--pb-design-w) * 100cqw)); }
